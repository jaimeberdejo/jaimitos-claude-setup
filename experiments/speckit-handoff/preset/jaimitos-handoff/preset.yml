# jaimitos-handoff — a Spec Kit PRESET that redirects the two commands which would otherwise make
# Spec Kit a second executor and a second queue.
#
# SCHEMA VERIFIED against the real pinned CLI (v0.12.13). The first draft was rejected by
# `specify preset add` for a missing `schema_version` and the wrong shape entirely — the live tier
# caught it. This matches presets/lean/preset.yml, a real upstream preset that replaces
# speckit.implement. Install (local dev): `specify preset add jaimitos-handoff --dev <this-dir>`.
# The command files live in commands/ (not templates/), named for the command they replace.
#
# A preset replaces a command's PROMPT. It CANNOT structurally stop a model from writing code. The
# real protection is stronger and lives elsewhere: nothing Spec Kit writes can tick a Jaimitos phase
# (scripts/tick.sh is the sole writer of "- [x]" and demands an evaluator PASS plus green evidence
# bound to HEAD), and specs/<NNN>/tasks.md is not the roadmap. This preset is a signpost, not a wall
# — it belongs in the README's Guarantee|Enforcement table under "Documented (prompt-level)".
#
# R2 (the preset treadmill) is REAL: the schema is not a contract and upstream ships several releases
# a day. This is verified against the PINNED CLI in the live tier; source inspection is not evidence.

schema_version: "1.0"

preset:
  id: "jaimitos-handoff"
  name: "Jaimitos handoff"
  version: "0.1.0"
  description: "Redirect Spec Kit's executor and convergence commands at Jaimitos, which owns implementation and the queue."
  author: "jaimitos-os (experimental)"
  repository: "https://github.com/jaimeberdejo/jaimitos-claude-setup"
  license: "MIT"

requires:
  speckit_version: ">=0.1.0"

provides:
  templates:
    - type: "command"
      name: "speckit.implement"
      file: "commands/speckit.implement.md"
      description: "Implementation is owned by Jaimitos (/phase), not Spec Kit."
      replaces: "speckit.implement"

    - type: "command"
      name: "speckit.converge"
      file: "commands/speckit.converge.md"
      description: "Convergence is report-only here; it changes no state."
      replaces: "speckit.converge"

tags:
  - "jaimitos"
  - "orchestration"
  - "experimental"
