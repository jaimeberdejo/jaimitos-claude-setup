name: lean-stack CI

# Guards the setup against regressions: shell syntax, settings.json validity,
# and the hook smoke tests. Does NOT require the `claude` CLI (not available in
# CI), so it runs everything that can be checked without a live model.

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure jq is available
        run: jq --version

      - name: Shell syntax (bash -n) on all scripts
        run: |
          fail=0
          for f in .claude/hooks/*.sh scripts/*.sh; do
            [ -f "$f" ] || continue
            if bash -n "$f"; then echo "ok: $f"; else echo "SYNTAX ERROR: $f"; fail=1; fi
          done
          exit $fail

      - name: settings.json is valid JSON with deny rules
        run: |
          jq empty .claude/settings.json
          jq -e '.permissions.deny | length > 0' .claude/settings.json >/dev/null \
            && echo "permissions.deny present" \
            || { echo "missing permissions.deny"; exit 1; }

      - name: shellcheck (advisory)
        continue-on-error: true
        run: |
          sudo apt-get update -qq && sudo apt-get install -y shellcheck
          shellcheck -S warning .claude/hooks/*.sh scripts/*.sh || true

      - name: Hook smoke tests
        run: |
          git config user.email ci@example.com
          git config user.name ci
          chmod +x .claude/hooks/*.sh scripts/*.sh
          bash scripts/test-hooks.sh
